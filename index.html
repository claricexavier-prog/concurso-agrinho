<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro é o seu Lar</title>
    <style>
        /* Configurações Gerais */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        /* Seção de Destaque (Hero) */
        .hero {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                              url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1920'); /* Imagem de montanha */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            color: #2ecc71; /* Verde */
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            color: #f1c40f; /* Amarelo */
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* Seção de Galeria */
        .galeria {
            padding: 50px 20px;
            background-color: #f4f4f4;
            text-align: center;
        }

        .galeria h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .grid-imagens {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid-imagens img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .grid-imagens img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Agro é o seu Lar</h1>
        <p>Crie sua imagem aqui em nosso site</p>
    </section>

    <section class="galeria">
        <h2>Exemplos de Imagens</h2>
        <div class="grid-imagens">
            <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500" alt="Campo 1">
            <img src="https://images.unsplash.com/photo-1444858291040-58f756a3bdd6?w=500" alt="Campo 2">
            <img src="https://images.unsplash.com/photo-1473976339452-048e930157c9?w=500" alt="Campo 3">
            <img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=500" alt="Campo 4">
        </div>
    </section>

</body>
</html>
